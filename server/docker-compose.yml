services:
  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hydro-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydro-backend
    ports:
      - "8000:8000"
    environment:
      - HYDRO_MQTT_BROKER=mosquitto
      - HYDRO_MQTT_PORT=1883
      - HYDRO_MQTT_USERNAME=hydro
      - HYDRO_MQTT_PASSWORD=Easy2Remember
      - HYDRO_DATABASE_URL=sqlite:///./data/hydro.db
    volumes:
      - ./data:/app/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  # Vue Dashboard (production build served by nginx)
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: hydro-dashboard
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
